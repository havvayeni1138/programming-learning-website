<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni Kayıt</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('m2.webp');
            background-size: 50%;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        nav {
            background-color: #35424a;
            color: white;
            padding: 10px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 2px 7px;
            display: inline-block;
        }

        nav a:hover {
            background-color: #444;
        }

        .container {
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            width: 60%;
            max-width: 600px;
            margin-top: 80px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            text-align: center;
        }

        h1 {
            color: #35424a;
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="date"],
        input[type="password"] {
            width: 100%;
            padding: 5px;
            margin-top: 5px;
            border: 2px solid #2c3e50;
            border-radius: 5px;
            background-color: #f9f9f9;
        }

        input[type="submit"] {
            background-color: #35424a;
            color: white;
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            width: 100%;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 16px;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }

        table {
            width: 100%;
            margin-top: 10px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #35424a;
            color: white;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">ANA SAYFA</a>
        <a href="hakkimda.html">HAKKIMIZDA</a>
        <a href="projeler.html">PROJELER</a>
        <a href="iletisim.html">İLETİŞİM</a>
        <a href="giris.html">GİRİŞ</a>
        <a href="egitim.html">EĞİTİMLERİMİZ</a>
    </nav>
    <div class="container">
        <h1>Kullanıcı İşlemleri</h1>
        <form id="userForm">
            <table class="table table-bordered">
                <tr>
                    <td>Kullanıcı Adı:</td>
                    <td><input type="text" name="kullaniciadi" id="kullaniciadi" class="form-control" required></td>
                </tr>
                <tr>
                    <td>Doğum Tarihi:</td>
                    <td><input type="date" name="dogtarihi" id="dogtarihi" class="form-control" required></td>
                </tr>
                <tr>
                    <td>Şifre:</td>
                    <td><input type="password" name="sifre" id="sifre" class="form-control" required></td>
                </tr>
            </table>
            <input type="submit" value="Yeni Kayıt" class="btn btn-primary">
        </form>

        <table class="table table-bordered table-hover mt-3">
            <thead>
                <tr>
                    <th>Kullanıcı Adı</th>
                    <th>Doğum Tarihi</th>
                    <th>İşlemler</th>
                </tr>
            </thead>
            <tbody id="userList">
            </tbody>
        </table>
    </div>

    <script>
        let database = JSON.parse(localStorage.getItem("database")) || [];

        document.getElementById("userForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const kullaniciadi = document.getElementById("kullaniciadi").value;
            const dogtarihi = document.getElementById("dogtarihi").value;
            const sifre = document.getElementById("sifre").value;

            if (database.some(user => user.kullaniciadi === kullaniciadi)) {
                alert("Bu kullanıcı adı zaten kayıtlı!");
                return;
            }
            const newUser = { id: Date.now(), kullaniciadi, dogtarihi, sifre };
            database.push(newUser);
            localStorage.setItem("database", JSON.stringify(database));
            renderUserList();
            clearForm();

            alert("Kayıt başarılı! Giriş sayfasına yönlendiriliyorsunuz...");
            window.location.href = "giris.html";
        });

        function renderUserList() {
            const userList = document.getElementById("userList");
            userList.innerHTML = "";

            database.forEach(user => {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${user.kullaniciadi}</td>
                    <td>${user.dogtarihi}</td>
                    <td>
                        <button class="btn btn-primary btn-sm" onclick="deleteUser(${user.id})">Sil</button>
                        <button class="btn btn-primary btn-sm" onclick="updateUser('${user.kullaniciadi}')">Güncelle</button>
                    </td>
                `;
                userList.appendChild(row);
            });
        }

        function deleteUser(userId) {
            database = database.filter(user => user.id !== userId);
            localStorage.setItem("database", JSON.stringify(database));
            renderUserList();
        }

        function updateUser(kullaniciadi) {
            const user = database.find(user => user.kullaniciadi === kullaniciadi);

            if (user) {
                document.getElementById("kullaniciadi").value = user.kullaniciadi;
                document.getElementById("dogtarihi").value = user.dogtarihi;
                document.getElementById("sifre").value = user.sifre;

                deleteUser(user.id);
            }
        }
        function clearForm() {
            document.getElementById("kullaniciadi").value = "";
            document.getElementById("dogtarihi").value = "";
            document.getElementById("sifre").value = "";
        }

        window.onload = renderUserList;
    </script>
</body>
</html>
